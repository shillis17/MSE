<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artists · Music Similarity Explorer</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/artists.css" />
  <link rel="icon" type="image/png" href="/ico.png">
</head>
<body data-page="artists">
  <div id="siteHeader"></div>

  <main>

    <div class="container">
      <section class="page-header">
        <span class="eyebrow">Artist Browser</span>
        <h1>Browse artists</h1>
        <p class="lead">Alphabetized list of artists in the catalog.</p>
      </section>

      <section class="panel">
        <div class="toolbar">
          <input id="artistFilter" class="search-input" type="text" placeholder="Filter..." autocomplete="off" />
          <select id="sortSelect" class="sort-select">
            <option value="name_asc">Name A–Z</option>
            <option value="name_desc">Name Z–A</option>
            <option value="tracks_desc">Most tracks</option>
            <option value="tracks_asc">Fewest tracks</option>
          </select>
          <div id="artistMeta" class="toolbar-meta">Loading artists...</div>
        </div>
      </section>

      <section class="panel">
        <div id="loadingState" class="loading-state">Loading artists...</div>
        <div id="errorState" class="error-state hidden">Could not load items.</div>
        <div id="emptyState" class="empty-state hidden">No artists match this filter.</div>
        <div id="artistsGrid" class="list-grid"></div>

        <div class="pagination list-pagination">
          <button id="prevButton" class="page-button" type="button">Previous</button>
          <button id="nextButton" class="page-button" type="button">Next</button>
        </div>
      </section>
    </div>

  </main>

  <div id="siteFooter"></div>

  <script src="js/site.js"></script>
  <script src="js/artists.js"></script>
</body>
</html>
