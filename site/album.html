<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Detail · Music Similarity Explorer</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/album.css" />
  <link rel="icon" type="image/png" href="/ico.png">
</head>
<body data-page="albums">
  <div id="siteHeader"></div>

  <main>

    <div class="container">
      <section class="page-header">
        <span class="eyebrow">Album Detail</span>
        <h1 id="pageTitle">Loading album...</h1>
        <p id="pageLead" class="lead">Album metadata and tracks appear below.</p>
      </section>

      <div id="loadingState" class="panel loading-state">Loading album data...</div>
      <div id="errorState" class="panel error-state hidden">Could not load this album.</div>

      <div id="pageLayout" class="detail-layout hidden">
        <section class="panel">
          <h2>Overview</h2>
          <div id="albumMeta" class="meta-grid"></div>
        </section>

        <section class="panel">
          <h2>Artists</h2>
          <div id="artistsList" class="result-list"></div>
        </section>

        <section class="panel detail-span-full">
          <h2>Tracks</h2>
          <div id="tracksList" class="result-list"></div>
        </section>
      </div>
    </div>

  </main>

  <div id="siteFooter"></div>

  <script src="js/site.js"></script>
  <script src="js/album.js"></script>
</body>
</html>
